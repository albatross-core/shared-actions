name: Create Deployment Record

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
        description: "Environment name (dev, qa, stage, prod)"
      sha:
        required: true
        type: string
        description: "Git commit SHA"
      tag:
        required: false
        type: string
        default: ""
        description: "Git tag (optional)"
      environment_url:
        required: false
        type: string
        default: ""
        description: "Environment URL (optional)"
      service-name:
        required: false
        type: string
        default: ""
        description: "Service name for the deployment description (defaults to repo name)"

jobs:
  create-record:
    runs-on: ubuntu-latest
    permissions:
      deployments: write
      contents: read
    steps:
      - name: Create GitHub Deployment
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const tag = '${{ inputs.tag }}';
            const serviceName = '${{ inputs.service-name }}' || context.repo.repo;
            const description = tag
              ? `${serviceName} ${tag} deployment to ${{ inputs.environment }}`
              : `${serviceName} deployment to ${{ inputs.environment }}`;

            const deployment = await github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: '${{ inputs.tag || inputs.sha }}',
              environment: '${{ inputs.environment }}',
              description: description,
              auto_merge: false,
              required_contexts: []
            });

            const statusParams = {
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: deployment.data.id,
              state: 'success',
              description: 'Deployment completed successfully'
            };

            if ('${{ inputs.environment_url }}') {
              statusParams.environment_url = '${{ inputs.environment_url }}';
            }

            await github.rest.repos.createDeploymentStatus(statusParams);

            console.log(`Deployment created for ${{ inputs.environment }}: ${deployment.data.id}`);
