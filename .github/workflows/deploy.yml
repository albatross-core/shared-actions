name: Deploy Service

on:
  workflow_call:
    inputs:
      cloud:
        required: true
        type: string
        description: "Cloud provider: gcp or aws"
      image-name:
        required: true
        type: string
        description: "Image name for the container registry"
      environment:
        required: true
        type: string
        description: "Target environment (dev, qa, prod)"
      service-name:
        required: false
        type: string
        default: ""
        description: "Service name in gitops patches (defaults to image-name)"
      dockerfile:
        required: false
        type: string
        default: "./Dockerfile"
        description: "Path to Dockerfile"
      build-args:
        required: false
        type: string
        default: ""
        description: "Extra Docker build args (multiline KEY=VALUE)"
      image-tag:
        required: false
        type: string
        default: ""
        description: "Image tag for gitops (defaults to environment)"
      # GCP
      gcp-project-id:
        required: false
        type: string
        default: ""
      gcp-ar-location:
        required: false
        type: string
        default: "europe-west3"
      gcp-ar-repository:
        required: false
        type: string
        default: "albatross"
      # AWS
      aws-region:
        required: false
        type: string
        default: "eu-central-1"
      aws-ecr-repository:
        required: false
        type: string
        default: ""
    secrets:
      GCP_SA_KEY:
        required: false
      AWS_ACCESS_KEY_ID:
        required: false
      AWS_SECRET_ACCESS_KEY:
        required: false
      GITOPS_ACCESS_TOKEN:
        required: true

jobs:
  build-push-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build and push
        uses: albatross-core/shared-actions/build-and-push@main
        with:
          cloud: ${{ inputs.cloud }}
          image-name: ${{ inputs.image-name }}
          environment: ${{ inputs.environment }}
          dockerfile: ${{ inputs.dockerfile }}
          build-args: ${{ inputs.build-args }}
          gcp-credentials-json: ${{ secrets.GCP_SA_KEY }}
          gcp-project-id: ${{ inputs.gcp-project-id }}
          gcp-ar-location: ${{ inputs.gcp-ar-location }}
          gcp-ar-repository: ${{ inputs.gcp-ar-repository }}
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ inputs.aws-region }}
          aws-ecr-repository: ${{ inputs.aws-ecr-repository }}

      - name: Update GitOps
        uses: albatross-core/shared-actions/update-gitops@main
        with:
          environment: ${{ inputs.environment }}
          service-name: ${{ inputs.service-name || inputs.image-name }}
          image-tag: ${{ inputs.image-tag || inputs.environment }}
          gitops-token: ${{ secrets.GITOPS_ACCESS_TOKEN }}
          cloud: ${{ inputs.cloud }}
