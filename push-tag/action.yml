name: "Push Semver Tag"
description: "Increment the latest semver patch tag and push it"

inputs:
  github-token:
    description: "GitHub token with permission to create tags"
    required: true

runs:
  using: "composite"
  steps:
    - name: Push tag
      uses: actions/github-script@v7
      with:
        github-token: ${{ inputs.github-token }}
        script: |
          const { data: tags } = await github.rest.repos.listTags({
            owner: context.repo.owner,
            repo: context.repo.repo,
            per_page: 1
          });
          if (tags.length === 0) throw new Error('No tags found');

          const latestTag = tags[0].name;
          console.log(`Latest tag: ${latestTag}`);

          const match = /^v?(\d+)\.(\d+)\.(\d+)/.exec(latestTag);
          if (!match) throw new Error(`Latest tag "${latestTag}" is not valid semver`);

          const [_, major, minor, patch] = match.map(Number);
          const newTag = `v${major}.${minor}.${patch + 1}`;
          console.log(`New tag: ${newTag}`);

          await github.rest.git.createRef({
            owner: context.repo.owner,
            repo: context.repo.repo,
            ref: `refs/tags/${newTag}`,
            sha: context.sha
          });

          console.log(`Tag ${newTag} created`);
